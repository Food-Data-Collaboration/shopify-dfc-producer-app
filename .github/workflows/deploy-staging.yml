name: Create and publish a Docker image

on:
  push:
    branches: ['staging']

jobs:
  build-and-push-image:
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      jelastic_env: ofn-producer-staging
    secrets:
      jelastic_access_token: ${{ secrets.JELASTIC_ACCESS_TOKEN }}
      shopify_api_key: ${{ secrets.SHOPIFY_API_KEY }}      
      